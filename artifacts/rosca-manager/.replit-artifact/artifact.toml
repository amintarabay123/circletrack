kind = "web"
previewPath = "/"
title = "Rosca Manager"
version = "1.0.0"
id = "artifacts/rosca-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19428

[services.development]
run = "pnpm --filter @workspace/rosca-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rosca-manager", "run", "build" ]
publicDir = "artifacts/rosca-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19428"
BASE_PATH = "/"
